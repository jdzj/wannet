<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wannet - 玩你想玩</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%234f46e5'/><path d='M30,50 H46 M38,42 V58 M64,46 A4,4 0 1,1 64,45.9 M74,54 A4,4 0 1,1 74,53.9' stroke='white' stroke-width='6' stroke-linecap='round' fill='white'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>.line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md"><i class="fa-solid fa-gamepad text-lg"></i></div>
                <span class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">Wannet Hub</span>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl gap-0.5" id="tabs">
                <button onclick="switchPlatform('free')" id="tab-free" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-500 text-white shadow-sm flex items-center gap-1 animate-pulse"><i class="fa-solid fa-gift"></i> 今日特惠</button>
                <button onclick="switchPlatform('cn')" id="tab-cn" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-600">App Store 国区</button>
                <button onclick="switchPlatform('us')" id="tab-us" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-600">美区</button>
                <button onclick="switchPlatform('steam')" id="tab-steam" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-600 flex items-center gap-1"><i class="fa-brands fa-steam"></i> Steam热销</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2" id="boardTitle">
                <i class="fa-solid fa-gift text-red-500"></i> 今日限免应用
            </h1>
            <p class="text-xs text-slate-400" id="updateTime">正在同步云端引擎...</p>
        </div>
        <div id="gameList" class="space-y-4"></div>
    </main>

    <script>
        let globalData = null;
        let currentPlatform = 'free';

        async function init() {
            try {
                const response = await fetch('./data/games.json');
                globalData = await response.json();
                render();
            } catch (error) {
                document.getElementById('gameList').innerHTML = `<div class='text-center py-12 text-slate-400'><i class="fa-solid fa-triangle-exclamation text-xl mb-2 block text-amber-500"></i>数据加载异常，正在等待后台数据流初始化，请稍后刷新。</div>`;
            }
        }

        function switchPlatform(platform) {
            currentPlatform = platform;
            ['free', 'cn', 'us', 'steam'].forEach(p => {
                const btn = document.getElementById(`tab-${p}`);
                if (!btn) return;
                if (p === platform) {
                    btn.className = p === 'free' ? "px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-500 text-white shadow-sm flex items-center gap-1" : "px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-indigo-600 shadow-sm fill-current";
                } else {
                    btn.className = p === 'free' ? "px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-red-500 hover:bg-red-50 flex items-center gap-1" : "px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-600 flex items-center gap-1";
                }
            });
            render();
        }

        function toggleDesc(index) {
            const el = document.getElementById(`desc-${index}`);
            if (el) el.classList.contains('line-clamp-3') ? el.classList.remove('line-clamp-3') : el.classList.add('line-clamp-3');
        }

        function render() {
            if (!globalData) return;

            const titleMap = {
                'free': '<i class="fa-solid fa-gift text-red-500"></i> 今日 App Store 限免应用 & 跨平台特惠专区',
                'cn': '<i class="fa-solid fa-trophy text-amber-500"></i> App Store 中国区精品畅销榜（全品类）',
                'us': '<i class="fa-solid fa-flag-usa text-blue-500"></i> App Store 美国区热门畅销榜（全品类）',
                'steam': '<i class="fa-brands fa-steam text-slate-900"></i> Steam 平台全球热销大作'
            };

            document.getElementById('boardTitle').innerHTML = titleMap[currentPlatform] || '应用看板';
            document.getElementById('updateTime').innerText = `同步完成: ${new Date(globalData.updateTime).toLocaleString()}`;

            const regionData = globalData.regions ? globalData.regions[currentPlatform] : null;
            const container = document.getElementById('gameList');

            if(!regionData || !regionData.games || regionData.games.length === 0) {
                container.innerHTML = `<div class="text-center py-12 bg-white rounded-2xl border border-slate-200 p-8 shadow-sm"><i class="fa-solid fa-circle-nodes text-3xl text-slate-300 mb-3 block"></i><p class="text-sm text-slate-400">该分类暂无有效缓存，正在等待下一次 Action 定时触发抓取。</p></div>`;
                return;
            }

            container.innerHTML = regionData.games.map((game, index) => {
                // 防御非数字格式的评价人数
                const subCountDisplay = isNaN(game.ratingCount) ? game.ratingCount : `${Number(game.ratingCount).toLocaleString()} 人评星`;
                const actionBtnColor = currentPlatform === 'free' ? 'bg-red-500 text-white hover:bg-red-600' : (currentPlatform === 'steam' ? 'bg-slate-900 text-white hover:bg-slate-800' : 'bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white');
                const actionBtnText = currentPlatform === 'free' ? '限时免费' : (currentPlatform === 'steam' ? 'Steam 商店' : '前往下载');

                // 安全渲染评论数组，防止因后台 API 缺失特定应用字段导致整页白屏
                const reviewsHtml = (game.reviews && Array.isArray(game.reviews)) ? game.reviews.map(r => `
                    <div class="bg-slate-50/40 p-2 rounded-lg text-xs border border-slate-100">
                        <div class="flex justify-between text-slate-400 text-[11px]">
                            <span class="font-bold text-slate-600">${r.author || '匿名用户'}</span>
                            <span class="text-amber-500 font-medium">${r.rating || '★'}</span>
                        </div>
                        <p class="text-slate-500 mt-0.5 leading-relaxed">${r.content || '未提供详细买家建议。'}</p>
                    </div>
                `).join('') : '<p class="text-xs text-slate-400 italic px-2">暂无精选评价</p>';

                return `
                    <div class="bg-white rounded-2xl border border-slate-200/60 p-5 shadow-sm hover:shadow-md transition-all">
                        <div class="flex items-start gap-4">
                            <span class="text-base font-black text-slate-300 w-6 pt-2 text-center">${game.rank || (index + 1)}</span>
                            <img src="${game.icon}" class="w-14 h-14 rounded-2xl object-cover border border-slate-100 shadow-sm flex-shrink-0" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?w=120&auto=format&fit=crop'">
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-slate-900 truncate text-base">${game.name}</h3>
                                <p class="text-xs text-slate-400 truncate">${game.developer}</p>
                                <div class="flex items-center gap-3 mt-1.5 text-xs">
                                    <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-medium">${game.primaryGenre}</span>
                                    <span class="text-amber-500 font-semibold flex items-center gap-0.5">
                                        <i class="fa-solid fa-star"></i> ${game.rating} <span class="text-slate-400 font-normal">(${subCountDisplay})</span>
                                    </span>
                                </div>
                            </div>
                            <a href="${game.appStoreUrl || '#'}" target="_blank" class="${actionBtnColor} px-4 py-1.5 rounded-xl text-xs font-bold transition-all self-center shadow-sm flex-shrink-0">${actionBtnText}</a>
                        </div>
                        <div class="mt-3 bg-slate-50 p-3 rounded-xl border border-slate-100/70">
                            <p id="desc-${index}" class="text-xs text-slate-500 leading-relaxed line-clamp-3 whitespace-pre-line">${game.description || '暂无描述。'}</p>
                            <button onclick="toggleDesc(${index})" class="text-indigo-600 font-semibold text-[11px] mt-1.5 block">展开 / 收起描述</button>
                        </div>
                        <div class="mt-3 pt-2.5 border-t border-slate-100 space-y-1.5">
                            <div class="text-[11px] font-bold text-slate-400 mb-1 px-1"><i class="fa-regular fa-comment-dots"></i> 精选购买建议：</div>
                            ${reviewsHtml}
                        </div>
                    </div>`;
            }).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
