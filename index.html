<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wannet - 玩你想玩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>.line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md"><i class="fa-solid fa-gamepad text-lg"></i></div>
                <span class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">Wannet Hub</span>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl gap-0.5" id="tabs">
                <button onclick="switchPlatform('free')" id="tab-free" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-500 text-white shadow-sm flex items-center gap-1 animate-pulse"><i class="fa-solid fa-gift"></i> 今日限免</button>
                <button onclick="switchPlatform('cn')" id="tab-cn" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-600">App Store 国区</button>
                <button onclick="switchPlatform('us')" id="tab-us" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-600">美区</button>
                <button onclick="switchPlatform('steam')" id="tab-steam" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-600 flex items-center gap-1"><i class="fa-brands fa-steam"></i> Steam热销</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2" id="boardTitle">
                <i class="fa-solid fa-gift text-red-500"></i> 今日限时免费/特惠精选
            </h1>
            <p class="text-xs text-slate-400" id="updateTime">正在获取同步频率...</p>
        </div>

        <div id="gameList" class="space-y-4"></div>
    </main>

    <script>
        let globalData = null;
        let currentPlatform = 'free'; // 默认切到限免专区

        async function init() {
            try {
                const response = await fetch('./data/games.json');
                globalData = await response.json();
                render();
            } catch (error) {
                document.getElementById('gameList').innerHTML = `<div class='text-center py-12 text-slate-400'>暂无游戏数据。请检查 GitHub Actions 执行日志。</div>`;
            }
        }

        function switchPlatform(platform) {
            currentPlatform = platform;
            ['free', 'cn', 'us', 'steam'].forEach(p => {
                const btn = document.getElementById(`tab-${p}`);
                if (p === platform) {
                    btn.className = p === 'free' 
                        ? "px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-500 text-white shadow-sm flex items-center gap-1"
                        : "px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-indigo-600 shadow-sm flex items-center gap-1";
                } else {
                    btn.className = p === 'free'
                        ? "px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-red-500 hover:bg-red-50 flex items-center gap-1"
                        : "px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-600 flex items-center gap-1";
                }
            });
            render();
        }

        function toggleDesc(index) {
            const el = document.getElementById(`desc-${index}`);
            if (el.classList.contains('line-clamp-3')) {
                el.classList.remove('line-clamp-3');
            } else {
                el.classList.add('line-clamp-3');
            }
        }

        function render() {
            if (!globalData || !globalData.regions[currentPlatform]) return;

            const titleMap = { 
                'free': '<i class="fa-solid fa-gift text-red-500"></i> 今日限时免费 / 独家特惠专区',
                'cn': '<i class="fa-solid fa-trophy text-amber-500"></i> App Store 中国区纯游戏榜', 
                'us': '<i class="fa-solid fa-flag-usa text-blue-500"></i> App Store 美国区纯游戏榜', 
                'steam': '<i class="fa-brands fa-steam text-slate-900"></i> Steam 平台全球畅销大作' 
            };
            document.getElementById('boardTitle').innerHTML = titleMap[currentPlatform];
            document.getElementById('updateTime').innerText = `更新时间: ${new Date(globalData.updateTime).toLocaleString()}`;

            const games = globalData.regions[currentPlatform].games;
            const container = document.getElementById('gameList');

            if(!games || games.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-400">该分类下暂无有效数据。</div>`;
                return;
            }

            container.innerHTML = games.map((game, index) => {
                const subCountDisplay = (currentPlatform === 'steam' || currentPlatform === 'free') ? game.ratingCount : `${Number(game.ratingCount).toLocaleString()}人评分`;
                const actionBtnColor = currentPlatform === 'free' ? 'bg-red-500 text-white hover:bg-red-600' : 'bg-slate-100 hover:bg-indigo-600 hover:text-white text-slate-600';
                const actionBtnText = currentPlatform === 'free' ? '立即去抢' : (currentPlatform === 'steam' ? 'Steam商店' : '下载');

                return `
                    <div class="bg-white rounded-2xl border border-slate-200/60 p-5 shadow-sm hover:shadow-md transition-all">
                        <div class="flex items-start gap-4">
                            <span class="text-lg font-bold text-slate-300 w-6 pt-2 text-center">${game.rank}</span>
                            <img src="${game.icon}" class="w-14 h-14 rounded-2xl object-cover border border-slate-100 shadow-sm">
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-slate-900 truncate text-base">${game.name}</h3>
                                <p class="text-xs text-slate-400 truncate">${game.developer}</p>
                                <div class="flex items-center gap-3 mt-1.5 text-xs">
                                    <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-medium">${game.primaryGenre}</span>
                                    <span class="text-amber-500 font-semibold flex items-center gap-0.5">
                                        <i class="fa-solid fa-star"></i> ${game.rating} <span class="text-slate-400 font-normal">(${subCountDisplay})</span>
                                    </span>
                                </div>
                            </div>
                            <a href="${game.appStoreUrl}" target="_blank" class="${actionBtnColor} px-4 py-1.5 rounded-full text-xs font-bold transition-all self-center shadow-sm">
                                ${actionBtnText}
                            </a>
                        </div>
                        <div class="mt-3 bg-slate-50 p-3 rounded-xl border border-slate-100/70">
                            <p id="desc-${index}" class="text-xs text-slate-500 leading-relaxed line-clamp-3 whitespace-pre-line">${game.description}</p>
                            <button onclick="toggleDesc(${index})" class="text-indigo-600 font-semibold text-[11px] mt-1.5 block">展开/折叠详情</button>
                        </div>
                        <div class="mt-3 pt-2.5 border-t border-slate-100 space-y-1.5">
                            ${game.reviews.map(r => `
                                <div class="bg-slate-50/50 p-2 rounded-lg text-xs">
                                    <div class="flex justify-between text-slate-400 text-[11px]">
                                        <span class="font-bold text-slate-600">${r.author}</span>
                                        <span class="text-amber-500 font-medium">${r.rating}</span>
                                    </div>
                                    <p class="text-slate-500 mt-0.5 leading-relaxed">${r.content}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        window.onload = init;
    </script>
</body>
</html>
