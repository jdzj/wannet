<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wannet - 玩你想玩</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23111827'/><path d='M30,50 H46 M38,42 V58 M64,46 A4,4 0 1,1 64,45.9 M74,54 A4,4 0 1,1 74,53.9' stroke='white' stroke-width='6' stroke-linecap='round' fill='white'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .desc-collapsed {
            display: -webkit-box !important;
            -webkit-line-clamp: 3 !important;
            -webkit-box-orient: vertical !important;
            overflow: hidden !important;
        }
        .desc-expanded {
            display: block !important;
            overflow: visible !important;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <nav class="bg-slate-950 border-b border-slate-800 sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md"><i class="fa-solid fa-gamepad text-lg"></i></div>
                <span class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">Wannet Hub</span>
            </div>
            <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-800 gap-0.5 overflow-x-auto max-w-[70%]" id="tabs">
                <button onclick="switchPlatform('free')" id="tab-free" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-600 text-white shadow-sm flex items-center gap-1 flex-shrink-0"><i class="fa-solid fa-gift"></i> 今日限免</button>
                <button onclick="switchPlatform('steam')" id="tab-steam" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-400 flex items-center gap-1 flex-shrink-0"><i class="fa-brands fa-steam"></i> Steam 畅销榜</button>
                <button onclick="switchPlatform('sale')" id="tab-sale" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-400 flex items-center gap-1 flex-shrink-0"><i class="fa-solid fa-tags"></i> Steam 特惠区</button>
                <button onclick="switchPlatform('itch')" id="tab-itch" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-400 flex items-center gap-1 flex-shrink-0"><i class="fa-solid fa-flask"></i> 独立游戏特惠</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-6 border-b border-slate-800 pb-4">
            <h1 class="text-xl font-bold text-slate-100 flex items-center gap-2" id="boardTitle">
                <i class="fa-solid fa-gift text-red-500"></i> Epic & Steam 线上聚合限免大作
            </h1>
            <p class="text-xs text-slate-500" id="updateTime">正在穿透多维百科元数据...</p>
        </div>
        <div id="gameList" class="space-y-4"></div>
    </main>

    <script>
        let globalData = null;
        let currentPlatform = 'free';

        async function init() {
            try {
                const response = await fetch('./data/games.json?t=' + new Date().getTime());
                globalData = await response.json();
                render();
            } catch (error) {
                document.getElementById('gameList').innerHTML = `<div class='text-center py-12 text-slate-500'><i class="fa-solid fa-triangle-exclamation text-xl mb-2 block text-amber-500"></i>全景数据未落盘，请等待 GitHub Actions 调度抓取。</div>`;
            }
        }

        function switchPlatform(platform) {
            currentPlatform = platform;
            ['free', 'steam', 'sale', 'itch'].forEach(p => {
                const btn = document.getElementById(`tab-${p}`);
                if (!btn) return;
                if (p === platform) {
                    btn.className = p === 'free' ? "px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-red-600 text-white shadow-sm flex items-center gap-1 flex-shrink-0" : "px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-slate-800 text-indigo-400 border border-slate-700 flex-shrink-0";
                } else {
                    btn.className = p === 'free' ? "px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-red-500 hover:bg-red-950/30 flex items-center gap-1 flex-shrink-0" : "px-3 py-1.5 rounded-lg text-xs font-medium transition-all text-slate-400 hover:text-slate-200 flex items-center gap-1 flex-shrink-0";
                }
            });
            render();
        }

        window.toggleDesc = function(index) {
            const el = document.getElementById(`desc-${index}`);
            const btn = document.getElementById(`btn-${index}`);
            if (el) {
                if (el.classList.contains('desc-collapsed')) {
                    el.classList.remove('desc-collapsed');
                    el.classList.add('desc-expanded');
                    btn.innerText = "收起全景简介";
                } else {
                    el.classList.remove('desc-expanded');
                    el.classList.add('desc-collapsed');
                    btn.innerText = "展开全景简介";
                }
            }
        }

        function render() {
            if (!globalData) return;

            const titleMap = {
                'free': '<i class="fa-solid fa-gift text-red-500"></i> Epic & Steam“喜加一”限免',
                'steam': '<i class="fa-brands fa-steam text-slate-400"></i> Steam 热销畅销榜',
                'sale': '<i class="fa-solid fa-tags text-emerald-500"></i> Steam 促销折扣区',
                'itch': '<i class="fa-solid fa-flask text-fuchsia-400"></i> Itch.io 优质独立游戏'
            };

            document.getElementById('boardTitle').innerHTML = titleMap[currentPlatform] || '游戏看盘';
            if (globalData.updateTime) {
                document.getElementById('updateTime').innerText = `更新于: ${new Date(globalData.updateTime).toLocaleString()}`;
            }

            const regionData = globalData.regions ? globalData.regions[currentPlatform] : null;
            const container = document.getElementById('gameList');

            if(!regionData || !regionData.games || regionData.games.length === 0) {
                container.innerHTML = `<div class="text-center py-12 bg-slate-950 rounded-2xl border border-slate-800 p-8"><i class="fa-solid fa-box-open text-3xl text-slate-700 mb-3 block"></i><p class="text-sm text-slate-400">当前在线流中暂无符合条件的元数据。</p></div>`;
                return;
            }

            container.innerHTML = regionData.games.map((game, index) => {
                const isFreeTag = currentPlatform === 'free';
                const actionBtnColor = isFreeTag ? 'bg-red-600 text-white hover:bg-red-700' : 'bg-slate-800 text-slate-200 hover:bg-indigo-600 hover:text-white border border-slate-700';
                const actionBtnText = isFreeTag ? '立即秒杀 ¥0' : '进入商店';
                const badgeStyle = isFreeTag ? 'bg-red-950/60 text-red-400 border border-red-900/50' : 'bg-slate-800 text-slate-300 border border-slate-700';

                const reviewsHtml = (game.reviews && Array.isArray(game.reviews)) ? game.reviews.map(r => `
                    <div class="bg-slate-950/60 p-3 rounded-xl text-xs border border-slate-800/80 shadow-md">
                        <div class="flex justify-between text-slate-500 text-[11px] mb-1">
                            <span class="font-bold text-slate-400">${r.author}</span>
                            <span class="text-amber-500 font-semibold">${r.rating}</span>
                        </div>
                        <p class="text-slate-400 leading-relaxed font-normal">${r.content}</p>
                    </div>
                `).join('') : '';

                return `
                    <div class="bg-slate-950 rounded-2xl border border-slate-800 p-5 shadow-lg hover:border-slate-700 transition-all">
                        <div class="flex items-start gap-4">
                            <span class="text-base font-black text-slate-700 w-6 pt-2 text-center">${game.rank || (index + 1)}</span>
                            <img src="${game.icon}" class="w-24 h-12 rounded-lg object-cover border border-slate-800 flex-shrink-0" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?w=120&auto=format&fit=crop'">
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-slate-100 truncate text-base">${game.name}</h3>
                                <p class="text-xs text-slate-500 truncate">${game.developer}</p>
                                <div class="flex items-center gap-3 mt-1.5 text-xs">
                                    <span class="${badgeStyle} px-2 py-0.5 rounded text-[11px]">${game.primaryGenre}</span>
                                    <span class="text-amber-500 font-semibold flex items-center gap-0.5">
                                        <i class="fa-solid fa-bolt-lightning"></i> ${game.ratingCount}
                                    </span>
                                </div>
                            </div>
                            <a href="${game.appStoreUrl || '#'}" target="_blank" class="${actionBtnColor} px-4 py-2 rounded-xl text-xs font-bold transition-all self-center shadow-md flex-shrink-0">${actionBtnText}</a>
                        </div>
                        <div class="mt-4 bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                            <p id="desc-${index}" class="text-xs text-slate-400 leading-relaxed desc-collapsed whitespace-pre-line">${game.description}</p>
                            <button id="btn-${index}" onclick="toggleDesc(${index})" class="text-indigo-400 font-semibold text-[11px] mt-2 block hover:text-indigo-300">展开全景简介 (多维度/剧情/关卡)</button>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-900 space-y-2">
                            <div class="text-[11px] font-bold text-slate-500 px-1 flex items-center gap-1"><i class="fa-regular fa-comment-dots text-indigo-400"></i> AI 视角看盘诊断：</div>
                            ${reviewsHtml}
                        </div>
                    </div>`;
            }).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
