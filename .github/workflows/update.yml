name: Update Games Data

on:
  schedule:
    - cron: '0 0 * * *' # 每天国际标准时间 0点（北京时间早上8点）自动执行
  workflow_dispatch: # 允许你像刚才一样在界面上手动点击触发

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 给予充足的爬取超时时间，防止被强行中断

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run Fetch Script
      run: node scripts/fetch-games.js

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/games.json
        git diff-index --quiet HEAD || git commit -m "自动更新：AppStore榜单、Steam大作及限免游戏"
        git push
